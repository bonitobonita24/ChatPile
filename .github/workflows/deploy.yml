name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'logs/**'
      - '.specstory/**'
      - '.claude/**'
      - '*.md'
      - '!CLAUDE.md'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/chatpile:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/chatpile:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Komodo staging redeploy
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.KOMODO_STAGING_WEBHOOK_URL }}
          GIT_SHA: ${{ github.sha }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            curl -sS -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: push" \
              -d "{\"ref\":\"refs/heads/main\",\"after\":\"$GIT_SHA\"}" || true
          fi
